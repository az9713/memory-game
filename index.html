<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game - 4x4</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-back: #34495e;
            --card-front: #ffffff;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .header {
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            perspective: 1000px;
            margin-bottom: 20px;
        }

        .card {
            aspect-ratio: 1 / 1;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.matched {
            cursor: default;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .card-back {
            background-color: var(--card-back);
            color: white;
        }

        .card-front {
            background-color: var(--card-front);
            transform: rotateY(180deg);
            border: 2px solid var(--accent-color);
        }

        .card.matched .card-front {
            border-color: var(--success-color);
            background-color: #e8f5e9;
        }

        .controls {
            margin-top: 10px;
        }

        button {
            padding: 10px 25px;
            font-size: 1rem;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #2980b9;
        }

        @media (max-width: 400px) {
            .grid {
                gap: 8px;
            }
            .card-face {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <h1>Memory Game</h1>
        </div>

        <div class="stats">
            <div>Moves: <span id="moves">0</span></div>
            <div>Time: <span id="timer">00:00</span></div>
        </div>

        <div class="grid" id="grid">
            <!-- Cards will be generated here -->
        </div>

        <div class="controls">
            <button id="reset-btn">Reset Game</button>
        </div>
    </div>

    <script>
        const gridElement = document.getElementById('grid');
        const movesElement = document.getElementById('moves');
        const timerElement = document.getElementById('timer');
        const resetBtn = document.getElementById('reset-btn');

        const symbols = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼'];
        let cards = [];
        let flippedCards = [];
        let moves = 0;
        let matches = 0;
        let timerInterval = null;
        let seconds = 0;
        let isLockGrid = false;

        function initGame() {
            // Reset state
            cards = [...symbols, ...symbols];
            shuffle(cards);
            moves = 0;
            matches = 0;
            seconds = 0;
            flippedCards = [];
            isLockGrid = false;
            
            movesElement.textContent = moves;
            timerElement.textContent = '00:00';
            clearInterval(timerInterval);
            timerInterval = null;

            // Clear and build grid
            gridElement.innerHTML = '';
            cards.forEach((symbol, index) => {
                const card = createCard(symbol, index);
                gridElement.appendChild(card);
            });
        }

        function createCard(symbol, index) {
            const card = document.createElement('div');
            card.classList.add('card');
            card.dataset.symbol = symbol;
            card.dataset.index = index;

            card.innerHTML = `
                <div class="card-face card-back">?</div>
                <div class="card-face card-front">${symbol}</div>
            `;

            card.addEventListener('click', () => flipCard(card));
            return card;
        }

        function flipCard(card) {
            if (isLockGrid || card.classList.contains('flipped') || card.classList.contains('matched')) {
                return;
            }

            // Start timer on first flip
            if (!timerInterval) {
                startTimer();
            }

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                moves++;
                movesElement.textContent = moves;
                checkForMatch();
            }
        }

        function checkForMatch() {
            const [card1, card2] = flippedCards;
            const isMatch = card1.dataset.symbol === card2.dataset.symbol;

            if (isMatch) {
                disableCards();
            } else {
                unflipCards();
            }
        }

        function disableCards() {
            flippedCards[0].classList.add('matched');
            flippedCards[1].classList.add('matched');
            matches++;
            
            resetSelection();

            if (matches === symbols.length) {
                clearInterval(timerInterval);
                setTimeout(() => alert(`Congratulations! You won in ${moves} moves and ${formatTime(seconds)}!`), 500);
            }
        }

        function unflipCards() {
            isLockGrid = true;
            setTimeout(() => {
                flippedCards[0].classList.remove('flipped');
                flippedCards[1].classList.remove('flipped');
                resetSelection();
            }, 1000);
        }

        function resetSelection() {
            flippedCards = [];
            isLockGrid = false;
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[array[j]]] = [array[j], array[i]]; // Swap correctly
                // Fixed swap:
                const temp = array[i];
                array[i] = array[j];
                array[j] = temp;
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                timerElement.textContent = formatTime(seconds);
            }, 1000);
        }

        function formatTime(s) {
            const mins = Math.floor(s / 60);
            const secs = s % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        resetBtn.addEventListener('click', initGame);

        // Initial launch
        initGame();
    </script>
</body>
</html>
